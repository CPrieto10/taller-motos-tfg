<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Únete al Taller | MOTOLOG</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="pantalla-acceso">
<main class="contenedor-centrado">
    <div class="card tarjeta-acceso">
        <h1 class="titulo-rojo">Únete al Taller</h1>
        <form id="registroForm">
            <input type="text" id="nombre" placeholder="Tu nombre" required>
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña (mín. 6 caracteres)" required>
            <button type="submit">Crear Cuenta</button>
        </form>
        <p class="enlace-acceso">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>
</main>
<script src="js/registro.js"></script>
</body>
</html>
