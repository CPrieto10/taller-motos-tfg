<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller de Motos - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-screen"> <div class="auth-card">
    <div class="card">
        <h1 style="text-align: center; color: var(--primary-red); margin-bottom: 2rem;">TALLER VIRTUAL</h1>
        <form id="loginForm">
            <label style="color: var(--text-muted); font-size: 0.8rem;">CORREO ELECTRÓNICO</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com" required>

            <label style="color: var(--text-muted); font-size: 0.8rem;">CONTRASEÑA</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <button type="submit" style="margin-top: 1rem;">ENTRAR AL GARAJE</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            ¿Nuevo por aquí? <a href="registro.html" style="color: var(--primary-red); text-decoration: none;">Crea una cuenta</a>
        </p>
    </div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
